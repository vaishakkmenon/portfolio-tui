name: Deploy Portfolio TUI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: TERM,COLORTERM
          request_pty: true
          script: |
            cd ~/portfolio-tui
            git pull origin main
            docker build -t portfolio-tui .
            
            # Stop and remove the old instance
            docker stop portfolio-app || true
            docker rm -f portfolio-app || true

            # Use -d to detach, and ensure no interactive flags are passed
            docker run -d \
              --name portfolio-app \
              -p 22:2222 \
              --restart unless-stopped \
              --read-only \
              --cap-drop=ALL \
              --security-opt no-new-privileges:true \
              -e TERM=xterm-256color \
              -e COLORTERM=$COLORTERM \
              -v $(pwd)/.ssh:/home/vaishak/.ssh:ro \
              portfolio-tui

            # Optional: A quick check to confirm the container is running
            docker ps | grep portfolio-app