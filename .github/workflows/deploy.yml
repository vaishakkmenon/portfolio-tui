name: Deploy Portfolio TUI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: TERM,COLORTERM
          request_pty: true 
          script: |
            # 1. Navigate and Update
            cd ~/portfolio-tui
            git pull origin main

            # 2. Build the new image
            docker build -t portfolio-tui .

            # 3. Aggressively clean up the old container
            docker stop portfolio-app || true
            docker rm -f portfolio-app || true

            # 4. Launch in detached mode (-d)
            # We use --init to ensure the process handles signals correctly
            docker run -d \
              --name portfolio-app \
              --init \
              -p 22:2222 \
              --restart unless-stopped \
              --read-only \
              --cap-drop=ALL \
              --security-opt no-new-privileges:true \
              -e TERM=xterm-256color \
              -e COLORTERM=$COLORTERM \
              -v $(pwd)/.ssh:/home/vaishak/.ssh:ro \
              portfolio-tui

            # 5. Verify and Exit
            echo "Waiting for container to stabilize..."
            sleep 2
            docker ps | grep portfolio-app
            exit 0